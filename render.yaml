# Render Blueprint for Syllabus Gallery
#
# Free-tier deploy.
# Note: free instances have no persistent disk — user data resets on every
# redeploy. The seed re-runs each build so the ECE-2024 syllabus restores.
# Upgrade to a paid plan with `disk:` configured for real persistence.

services:
  - type: web
    name: syllabus-gallery
    runtime: ruby
    plan: free
    region: singapore
    buildCommand: |
      bundle install
      ./bin/rails assets:precompile
      ./bin/rails db:prepare
      ./bin/rails db:seed
    startCommand: bundle exec rails server -p $PORT -b 0.0.0.0
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: enabled
      - key: RAILS_SERVE_STATIC_FILES
        value: enabled
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "1"
